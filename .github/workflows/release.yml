name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SciPlotter-windows
            artifact_path: dist/release/SciPlotter-windows.exe
          - os: macos-latest
            artifact_name: SciPlotter-macos
            artifact_path: dist/release/SciPlotter-macos.zip
          - os: ubuntu-latest
            artifact_name: SciPlotter-linux
            artifact_path: |
              dist/release/SciPlotter-linux.AppImage
              dist/release/SciPlotter-linux.deb

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap build environment
        run: python scripts/bootstrap.py --build --reuse-active

      - name: Build packaged artifact
        run: python scripts/build_release.py --clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/SciPlotter-windows/SciPlotter-windows.exe
            release-assets/SciPlotter-macos/SciPlotter-macos.zip
            release-assets/SciPlotter-linux/SciPlotter-linux.AppImage
            release-assets/SciPlotter-linux/SciPlotter-linux.deb